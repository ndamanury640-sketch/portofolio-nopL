<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e11;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #c8f135;
    --accent2: #7b61ff;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --high: #ff4d6d;
    --med: #ffa843;
    --low: #4dffb4;
    --done-bg: #1a2a1a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,17,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
    position: relative; z-index: 1;
  }

  /* ── STATS BAR ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .3s;
  }
  .stat-card:hover::after { transform: scaleX(1); }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: var(--text);
  }
  .stat-card.done .stat-value { color: var(--accent); }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .progress-bar {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .progress-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    min-width: 44px;
    text-align: right;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px 10px 40px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }

  select, .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    cursor: pointer;
    outline: none;
    transition: border-color .2s, background .2s;
  }
  select:focus, .filter-btn:hover { border-color: var(--accent2); }
  select option { background: var(--surface2); }

  .filter-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* ── ADD BUTTON ── */
  .btn-add {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent);
    color: #0e0e11;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border: none;
    border-radius: var(--radius);
    padding: 10px 18px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    white-space: nowrap;
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,241,53,.25); }
  .btn-add:active { transform: translateY(0); }

  /* ── TASK LIST ── */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .empty-state {
    text-align: center;
    padding: 64px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* ── TASK CARD ── */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color .2s, opacity .2s, transform .15s;
    animation: slideIn .25s ease;
    position: relative;
    overflow: hidden;
  }
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .task-card.high::before  { background: var(--high); }
  .task-card.medium::before { background: var(--med); }
  .task-card.low::before   { background: var(--low); }

  .task-card:hover { border-color: #3a3a48; transform: translateX(2px); }
  .task-card.done-card {
    opacity: 0.55;
    background: var(--done-bg);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Checkbox */
  .task-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    transition: background .15s, border-color .15s;
  }
  .task-check:hover { border-color: var(--accent); }
  .task-check.checked { background: var(--accent); border-color: var(--accent); }
  .task-check.checked svg { display: block; }
  .task-check svg { display: none; width: 12px; height: 12px; }

  /* Content */
  .task-content { flex: 1; min-width: 0; }

  .task-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    word-break: break-word;
    transition: color .2s, text-decoration .2s;
  }
  .done-card .task-title {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-desc {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    word-break: break-word;
  }

  .task-meta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 99px;
  }
  .badge.high   { background: rgba(255,77,109,.15); color: var(--high); }
  .badge.medium { background: rgba(255,168,67,.15);  color: var(--med); }
  .badge.low    { background: rgba(77,255,180,.15);  color: var(--low); }

  .status-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .status-badge.inprogress { color: var(--accent2); border-color: var(--accent2); background: rgba(123,97,255,.1); }
  .status-badge.done-s     { color: var(--accent);  border-color: var(--accent);  background: rgba(200,241,53,.1); }

  .due-date {
    font-size: 12px;
    color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .due-date.overdue { color: var(--high); }

  /* Task actions */
  .task-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .2s;
  }
  .task-card:hover .task-actions { opacity: 1; }

  .icon-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s, border-color .15s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .icon-btn.delete:hover { color: var(--high); border-color: rgba(255,77,109,.3); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: 100%; max-width: 480px;
    transform: translateY(16px);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    color: var(--accent);
  }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent2); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 24px;
  }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 18px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .btn-secondary:hover { border-color: var(--text); color: var(--text); }

  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #0e0e11;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 22px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,241,53,.25); }

  /* ── COLUMN HEADERS ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .count-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 11px;
    color: var(--muted);
    padding: 1px 8px;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    header { padding: 0 16px; }
    main { padding: 20px 16px 60px; }
    .controls { gap: 8px; }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: transform .3s, opacity .3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.accent { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Task<span>Flow</span></div>
  <div class="header-actions">
    <button class="btn-add" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Tambah Task
    </button>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Task</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">To Do</div>
      <div class="stat-value" id="stat-todo">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">In Progress</div>
      <div class="stat-value" id="stat-inprogress">0</div>
    </div>
    <div class="stat-card done">
      <div class="stat-label">Selesai</div>
      <div class="stat-value" id="stat-done">0</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <span class="progress-label">Progres keseluruhan</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="progress-pct" id="progress-pct">0%</span>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Cari task..." oninput="renderTasks()" />
    </div>
    <select id="filter-status" onchange="renderTasks()">
      <option value="all">Semua Status</option>
      <option value="todo">To Do</option>
      <option value="inprogress">In Progress</option>
      <option value="done">Selesai</option>
    </select>
    <select id="filter-priority" onchange="renderTasks()">
      <option value="all">Semua Prioritas</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select id="sort-by" onchange="renderTasks()">
      <option value="newest">Terbaru</option>
      <option value="oldest">Terlama</option>
      <option value="due">Due Date</option>
      <option value="priority">Prioritas</option>
    </select>
  </div>

  <!-- Task list -->
  <div class="task-list" id="task-list"></div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Tambah Task</div>
      <button class="icon-btn" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">Judul Task *</label>
      <input class="form-input" id="f-title" type="text" placeholder="Contoh: Buat laporan mingguan" />
    </div>
    <div class="form-group">
      <label class="form-label">Deskripsi</label>
      <textarea class="form-textarea" id="f-desc" placeholder="Detail task (opsional)..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prioritas</label>
        <select class="form-select" id="f-priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="f-status">
          <option value="todo">To Do</option>
          <option value="inprogress">In Progress</option>
          <option value="done">Selesai</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Due Date</label>
      <input class="form-input" id="f-due" type="date" />
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Batal</button>
      <button class="btn-primary" onclick="saveTask()">Simpan</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
let editingId = null;

// ── PERSIST ────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
}

// ── MODAL ──────────────────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = id ? 'Edit Task' : 'Tambah Task';

  if (id) {
    const t = tasks.find(t => t.id === id);
    document.getElementById('f-title').value    = t.title;
    document.getElementById('f-desc').value     = t.desc;
    document.getElementById('f-priority').value = t.priority;
    document.getElementById('f-status').value   = t.status;
    document.getElementById('f-due').value      = t.due;
  } else {
    document.getElementById('f-title').value    = '';
    document.getElementById('f-desc').value     = '';
    document.getElementById('f-priority').value = 'medium';
    document.getElementById('f-status').value   = 'todo';
    document.getElementById('f-due').value      = '';
  }

  overlay.classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 200);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === e.currentTarget) closeModal();
}

// ── SAVE / DELETE ──────────────────────────────────────────────────────
function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) {
    document.getElementById('f-title').focus();
    showToast('⚠ Judul task wajib diisi!');
    return;
  }

  const data = {
    title,
    desc:     document.getElementById('f-desc').value.trim(),
    priority: document.getElementById('f-priority').value,
    status:   document.getElementById('f-status').value,
    due:      document.getElementById('f-due').value,
  };

  if (editingId) {
    const idx = tasks.findIndex(t => t.id === editingId);
    tasks[idx] = { ...tasks[idx], ...data };
    showToast('✓ Task diperbarui', true);
  } else {
    tasks.unshift({ ...data, id: crypto.randomUUID(), createdAt: Date.now() });
    showToast('✓ Task ditambahkan', true);
  }

  save();
  closeModal();
  renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderTasks();
  showToast('Task dihapus');
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  t.status = t.status === 'done' ? 'todo' : 'done';
  save();
  renderTasks();
}

// ── RENDER ─────────────────────────────────────────────────────────────
function getFiltered() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const st  = document.getElementById('filter-status').value;
  const pr  = document.getElementById('filter-priority').value;
  const srt = document.getElementById('sort-by').value;

  let list = tasks.filter(t => {
    const matchQ  = !q || t.title.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q);
    const matchSt = st === 'all' || t.status === st;
    const matchPr = pr === 'all' || t.priority === pr;
    return matchQ && matchSt && matchPr;
  });

  const prOrder = { high: 0, medium: 1, low: 2 };
  if (srt === 'oldest')  list.sort((a,b) => a.createdAt - b.createdAt);
  else if (srt === 'due') list.sort((a,b) => {
    if (!a.due && !b.due) return 0;
    if (!a.due) return 1;
    if (!b.due) return -1;
    return a.due.localeCompare(b.due);
  });
  else if (srt === 'priority') list.sort((a,b) => prOrder[a.priority] - prOrder[b.priority]);
  else list.sort((a,b) => b.createdAt - a.createdAt);

  return list;
}

function formatDue(due) {
  if (!due) return '';
  const d = new Date(due + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  const opts = { day: 'numeric', month: 'short' };
  const label = d.toLocaleDateString('id-ID', opts);
  if (diff < 0) return `<span class="due-date overdue">⚠ ${label}</span>`;
  if (diff === 0) return `<span class="due-date overdue">Hari ini</span>`;
  if (diff === 1) return `<span class="due-date">Besok · ${label}</span>`;
  return `<span class="due-date">📅 ${label}</span>`;
}

const statusLabel = { todo: 'To Do', inprogress: 'In Progress', done: 'Selesai' };
const statusClass = { todo: '', inprogress: 'inprogress', done: 'done-s' };

function renderTasks() {
  const list = getFiltered();
  const container = document.getElementById('task-list');

  // Stats
  const total      = tasks.length;
  const todoCnt    = tasks.filter(t => t.status === 'todo').length;
  const inprogCnt  = tasks.filter(t => t.status === 'inprogress').length;
  const doneCnt    = tasks.filter(t => t.status === 'done').length;
  const pct        = total ? Math.round(doneCnt / total * 100) : 0;

  document.getElementById('stat-total').textContent     = total;
  document.getElementById('stat-todo').textContent      = todoCnt;
  document.getElementById('stat-inprogress').textContent = inprogCnt;
  document.getElementById('stat-done').textContent      = doneCnt;
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('progress-pct').textContent   = pct + '%';

  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>${tasks.length ? 'Tidak ada task yang cocok.' : 'Belum ada task. Tambahkan task pertamamu!'}</p>
      </div>`;
    return;
  }

  // Group by status
  const groups = [
    { key: 'todo',       label: 'To Do' },
    { key: 'inprogress', label: 'In Progress' },
    { key: 'done',       label: 'Selesai' },
  ];

  let html = '';
  for (const g of groups) {
    const items = list.filter(t => t.status === g.key);
    if (!items.length) continue;

    html += `<div class="section-label">${g.label} <span class="count-pill">${items.length}</span></div>`;

    for (const t of items) {
      const isDone   = t.status === 'done';
      const checkCls = isDone ? 'checked' : '';
      const cardCls  = isDone ? 'done-card' : '';
      html += `
      <div class="task-card ${t.priority} ${cardCls}" id="card-${t.id}">
        <div class="task-check ${checkCls}" onclick="toggleDone('${t.id}')">
          <svg viewBox="0 0 12 12" fill="none" stroke="#0e0e11" stroke-width="2.5">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
        <div class="task-content">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.desc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : ''}
          <div class="task-meta">
            <span class="badge ${t.priority}">${t.priority}</span>
            <span class="status-badge ${statusClass[t.status]}">${statusLabel[t.status]}</span>
            ${formatDue(t.due)}
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" title="Edit" onclick="openModal('${t.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="icon-btn delete" title="Hapus" onclick="deleteTask('${t.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </div>`;
    }
  }

  container.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TOAST ──────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, accent = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (accent ? ' accent' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
}

// ── KEYBOARD ───────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openModal(); }
});

// ── INIT ───────────────────────────────────────────────────────────────
renderTasks();
</script>
</body>
</html>
