<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #f8fafc; }
    #root { min-height: 100vh; }
    /* Loading spinner */
    #loader {
      position: fixed; inset: 0;
      background: #0f2554;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity .4s;
    }
    #loader .icon { font-size: 48px; }
    #loader .title { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
    #loader .sub { color: rgba(255,255,255,0.5); font-size: 13px; }
    #loader .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

function StatCard({label,value,sub,icon,bg}){
  return(
    <div style={{...s.card,display:"flex",alignItems:"center",gap:16}}>
      <div style={{width:52,height:52,borderRadius:14,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{icon}</div>

        <div style={{fontSize:28,fontWeight:800,color:c.gray900,lineHeight:1.1}}>{value}</div>
        {sub && <div style={{fontSize:12,color:c.gray500,marginTop:2}}>{sub}</div>}
      </div>
    </div>
  );
}

function Toast({msg,onClose}){
  useEffect(()=>{ const t=setTimeout(onClose,3000);return()=>clearTimeout(t); },[]);
  return(
    <div style={{position:"fixed",bottom:28,right:28,background:c.gray800,color:"#fff",padding:"12px 20px",borderRadius:10,fontSize:14,fontWeight:500,zIndex:9999,boxShadow:"0 8px 32px rgba(0,0,0,0.18)",display:"flex",alignItems:"center",gap:10,maxWidth:360}}>
      <span>✓</span>{msg}
      <button onClick={onClose} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",marginLeft:8,opacity:.7,fontSize:16}}>×</button>
    </div>
  );
}

// DASHBOARD
function DashboardPage({showToast}){
  const totalBooks=MOCK_BOOKS.reduce((s,b)=>s+b.stock,0);

  const maxV=Math.max(...chartData.map(d=>Math.max(d.borrow,d.ret)));
  return(
    <div style={{padding:"28px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:24}}>
        <StatCard label="Total Books" value={totalBooks} sub="Across all categories" icon="📚" bg={c.blueLight}/>
        <StatCard label="Borrowed" value={borrowed} sub="Currently out" icon="🔄" bg={c.amberLight}/>
        <StatCard label="Available" value={available} sub="Ready to borrow" icon="✅" bg={c.greenLight}/>
        <StatCard label="Active Students" value={MOCK_STUDENTS.length} sub="Registered members" icon="👥" bg="#ede9fe"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:20,marginBottom:20}}>
        <div style={s.card}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:4,color:c.gray900}}>Weekly Activity</div>
          <div style={{fontSize:13,color:c.gray500,marginBottom:20}}>Borrowing vs Returns this week</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:12,height:160}}>
            {chartData.map((d,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,height:"100%"}}>
                <div style={{flex:1,width:"100%",display:"flex",alignItems:"flex-end",gap:3}}>
                  <div style={{flex:1,background:c.blue2,borderRadius:"4px 4px 0 0",height:`${(d.borrow/maxV)*100}%`,minHeight:4}}/>
                  <div style={{flex:1,background:c.blueLight,borderRadius:"4px 4px 0 0",height:`${(d.ret/maxV)*100}%`,minHeight:4}}/>
                </div>
                <div style={{fontSize:11,color:c.gray500}}>{d.label}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:16,marginTop:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:c.gray500}}><div style={{width:10,height:10,borderRadius:2,background:c.blue2}}/> Borrowed</div>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:c.gray500}}><div style={{width:10,height:10,borderRadius:2,background:c.blueLight}}/> Returned</div>
          </div>
        </div>
        <div style={s.card}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:16,color:c.gray900}}>By Category</div>
          {["Fiction","Non-Fiction","Sci-Fi","Memoir","Self-Help"].map((cat,i)=>{
            const pcts=[38,22,18,12,10];
            const clrs=[c.blue2,c.green,c.amber,"#8b5cf6","#ec4899"];
            return(
              <div key={cat} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:c.gray700}}>{cat}</span><span style={{color:c.gray500,fontWeight:600}}>{pcts[i]}%</span></div>

                  {label}

              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

  const filtered=books.filter(b=>(cat==="All"||b.category===cat)&&(b.title.toLowerCase().includes(search.toLowerCase())||b.author.toLowerCase().includes(search.toLowerCase())));
  const paginated=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);
  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  function openAdd(){setEditBook(null);setForm({title:"",author:"",isbn:"",category:"Fiction",stock:1});setShowModal(true);}
  function openEdit(b){setEditBook(b);setForm({title:b.title,author:b.author,isbn:b.isbn,category:b.category,stock:b.stock});setShowModal(true);}
  function save(){
    if(!form.title)return;
    if(editBook){setBooks(books.map(b=>b.id===editBook.id?{...b,...form}:b));showToast("Book updated");}
    else{setBooks([{...form,id:Date.now(),available:form.stock,rating:4.0,year:2024,description:"",cover:"https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=120&q=80"},...books]);showToast("Book added");}
    setShowModal(false);
  }
  function del(id){setBooks(books.filter(b=>b.id!==id));showToast("Book deleted");}
  return(
    <div style={{padding:"28px"}}>
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{position:"relative",flex:1,minWidth:200}}>

        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {CATEGORIES.map(ct=><button key={ct} onClick={()=>{setCat(ct);setPage(1);}} style={{...s.btn(cat===ct?"primary":"ghost"),padding:"8px 14px",fontSize:13}}>{ct}</button>)}
        </div>
        <button onClick={openAdd} style={s.btn("primary")}>＋ Add Book</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16,marginBottom:24}}>
        {paginated.map(book=>(
          <div key={book.id} style={{...s.card,padding:0,overflow:"hidden"}}>
            <div style={{display:"flex"}}>
              <div style={{width:90,flexShrink:0,overflow:"hidden"}}>
                <img src={book.cover} alt={book.title} style={{width:"100%",height:"100%",objectFit:"cover",minHeight:130}} onError={e=>{e.target.src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=120&q=80";}}/>
              </div>
              <div style={{padding:"14px 14px 14px 12px",flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:c.gray900,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{book.title}</div>
                <div style={{fontSize:12,color:c.gray500,marginBottom:8}}>{book.author} · {book.year}</div>
                <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                  <span style={s.badge(c.blue2,c.blueLight)}>{book.category}</span>
                  <span style={s.badge(book.available>0?c.green:c.red,book.available>0?c.greenLight:c.redLight)}>{book.available>0?`${book.available} avail.`:"Out"}</span>
                </div>
                <div style={{fontSize:12,color:c.gray400,marginBottom:10}}>Stock: {book.stock} · ⭐ {book.rating}</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>openEdit(book)} style={{...s.btn("secondary"),padding:"5px 10px",fontSize:12}}>Edit</button>
                  <button onClick={()=>del(book.id)} style={{...s.btn("danger"),padding:"5px 10px",fontSize:12}}>Delete</button>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
      {totalPages>1&&<div style={{display:"flex",gap:8,justifyContent:"center"}}>{Array.from({length:totalPages},(_,i)=>i+1).map(p=><button key={p} onClick={()=>setPage(p)} style={{...s.btn(p===page?"primary":"ghost"),padding:"7px 14px"}}>{p}</button>)}</div>}
      {showModal&&(
        <Modal title={editBook?"Edit Book":"Add New Book"} onClose={()=>setShowModal(false)}>
          {[["Title","title"],["Author","author"],["ISBN","isbn"]].map(([l,k])=>(
            <div key={k} style={{marginBottom:14}}><label style={s.label}>{l}</label><input value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} style={s.input}/></div>
          ))}
          <div style={{marginBottom:14}}><label style={s.label}>Category</label><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={s.input}>{CATEGORIES.filter(ct=>ct!=="All").map(ct=><option key={ct}>{ct}</option>)}</select></div>
          <div style={{marginBottom:20}}><label style={s.label}>Stock</label><input type="number" min="1" value={form.stock} onChange={e=>setForm({...form,stock:parseInt(e.target.value)||1})} style={s.input}/></div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowModal(false)} style={s.btn("ghost")}>Cancel</button>

        </Modal>
      )}
    </div>
  );
}

function BorrowPage({showToast}){
  const [borrows,setBorrows]=useState(MOCK_BORROWS);

    if(!form.student||!form.book||!form.due){showToast("Please fill all fields");return;}
    setBorrows([{id:Date.now(),studentName:form.student,bookTitle:form.book,borrowDate:new Date().toISOString().split("T")[0],dueDate:form.due,status:"active",fine:0},...borrows]);
    showToast("Book borrowed");setShowModal(false);setForm({student:"",book:"",due:""});

        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:c.gray50}}>
            {["Student","Book Title","Borrow Date","Due Date","Status","Fine","Action"].map(h=><th key={h} style={{padding:"12px 16px",textAlign:"left",fontSize:12,fontWeight:700,color:c.gray500,letterSpacing:.5,borderBottom:`1px solid ${c.gray200}`,whiteSpace:"nowrap"}}>{h}</th>)}

                  <td style={{padding:"12px 16px"}}>{b.status==="active"||b.status==="overdue"?<button onClick={()=>markReturn(b.id)} style={{...s.btn("secondary"),padding:"5px 12px",fontSize:12}}>Return</button>:<span style={{color:c.gray400,fontSize:13}}>Done</span>}</td>

}

          <div><label style={s.label}>Fine/Day (Rp)</label><input type="number" value={settings.finePer} onChange={e=>setSettings({...settings,finePer:e.target.value})} style={s.input}/></div>
          <div><label style={s.label}>Max Borrow</label><input type="number" value={settings.maxBorrow} onChange={e=>setSettings({...settings,maxBorrow:e.target.value})} style={s.input}/></div>
          <div><label style={s.label}>Borrow Days</label><input type="number" value={settings.borrowDays} onChange={e=>setSettings({...settings,borrowDays:e.target.value})} style={s.input}/></div>
        </div>
        <div style={{marginBottom:16}}><label style={s.label}>Language</label><select value={settings.lang} onChange={e=>setSettings({...settings,lang:e.target.value})} style={s.input}><option value="id">Bahasa Indonesia</option><option value="en">English</option></select></div>
        {[["notifications","Enable Notifications"],["autoRemind","Auto Due-Date Reminders"]].map(([k,l])=>(
          <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:`1px solid ${c.gray100}`}}>
            <span style={{fontSize:14,color:c.gray700}}>{l}</span>
            <button onClick={()=>setSettings({...settings,[k]:!settings[k]})} style={{width:44,height:24,borderRadius:99,background:settings[k]?c.blue2:c.gray200,border:"none",cursor:"pointer",position:"relative"}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:settings[k]?23:3,transition:"left 0.2s"}}/>
            </button>
          </div>
        ))}
        <div style={{marginTop:20,display:"flex",gap:10}}>
          <button onClick={()=>showToast("Settings saved!")} style={s.btn("primary")}>Save Settings</button>
          <button onClick={()=>showToast("Data exported!")} style={s.btn("ghost")}>📥 Export</button>
        </div>
      </div>
    </div>
  );
}

// LOGIN PAGE
function LoginPage({onLogin}){
  const [tab,setTab]=useState("login");
  const [form,setForm]=useState({email:"",password:"",name:"",role:"student"});
  const [error,setError]=useState("");
  function submit(){
    if(!form.email||!form.password){setError("Please fill all fields");return;}
    if(tab==="login"){const rm={"admin@school.edu":"admin","lib@school.edu":"librarian"};onLogin(rm[form.email]||"student");}
    else{if(!form.name){setError("Name required");return;}onLogin(form.role);}
  }
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${c.navy} 0%,${c.blue} 60%,#1e40af 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20,position:"relative",overflow:"hidden"}}>
      {[[300,-100,500],[-100,200,300],[400,400,200]].map(([x,y,sz],i)=>(
        <div key={i} style={{position:"absolute",left:x,top:y,width:sz,height:sz,borderRadius:"50%",border:"1px solid rgba(255,255,255,0.08)",pointerEvents:"none"}}/>
      ))}
      <div style={{width:"100%",maxWidth:420,position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:48,marginBottom:8}}>📖</div>
          <div style={{color:"#fff",fontSize:28,fontWeight:800,letterSpacing:.5}}>LibraryHub</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:14,marginTop:4}}>School Library Management System</div>
        </div>
        <div style={{background:"#fff",borderRadius:18,overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,0.25)"}}>
          <div style={{display:"flex",borderBottom:`1px solid ${c.gray100}`}}>
            {["login","register"].map(t=>(
              <button key={t} onClick={()=>{setTab(t);setError("");}} style={{flex:1,padding:"16px",border:"none",background:tab===t?c.white:c.gray50,fontWeight:tab===t?700:400,fontSize:15,color:tab===t?c.blue2:c.gray500,cursor:"pointer",borderBottom:tab===t?`2px solid ${c.blue2}`:"2px solid transparent",fontFamily:"inherit"}}>
                {t==="login"?"Sign In":"Register"}
              </button>
            ))}
          </div>
          <div style={{padding:"28px 28px 24px"}}>
            {tab==="register"&&<div style={{marginBottom:16}}><label style={s.label}>Full Name</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Your full name" style={s.input}/></div>}
            <div style={{marginBottom:16}}><label style={s.label}>Email Address</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="you@school.edu" style={s.input}/></div>
            <div style={{marginBottom:4}}><label style={s.label}>Password</label><input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="••••••••" style={s.input}/></div>
            {tab==="login"&&<div style={{textAlign:"right",marginBottom:16}}><button style={{background:"none",border:"none",color:c.blue2,fontSize:13,cursor:"pointer",fontWeight:500}}>Forgot password?</button></div>}
            {tab==="register"&&<div style={{margin:"16px 0"}}><label style={s.label}>Role</label><select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} style={s.input}><option value="student">Student</option><option value="librarian">Librarian</option><option value="admin">Admin</option></select></div>}
            {error&&<div style={{color:c.red,fontSize:13,marginBottom:12,background:c.redLight,padding:"8px 12px",borderRadius:8}}>⚠ {error}</div>}
            <button onClick={submit} style={{...s.btn("primary"),width:"100%",justifyContent:"center",padding:"12px",fontSize:15}}>
              {tab==="login"?"Sign In →":"Create Account →"}
            </button>
            {tab==="login"&&<div style={{marginTop:16,padding:"12px",background:c.blueSoft,borderRadius:10,fontSize:12,color:c.gray600}}><strong>Demo:</strong> admin@school.edu / lib@school.edu · any password</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// APP ROOT
function App(){
  const [auth,setAuth]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [toast,setToast]=useState(null);
  function showToast(msg){setToast(msg);}

  useEffect(()=>{
    const loader=document.getElementById("loader");
    if(loader){loader.style.opacity="0";setTimeout(()=>loader.style.display="none",400);}
  },[]);

  if(!auth) return <LoginPage onLogin={role=>setAuth(role)}/>;

  const pages={
    dashboard:<DashboardPage showToast={showToast}/>,
    books:<BooksPage showToast={showToast}/>,
    borrow:<BorrowPage showToast={showToast}/>,
    students:<StudentsPage showToast={showToast}/>,
    digital:<DigitalPage showToast={showToast}/>,
    analytics:<AnalyticsPage/>,
    settings:<SettingsPage showToast={showToast}/>,
  };

  return(
    <div style={{display:"flex",fontFamily:"'DM Sans','Segoe UI',sans-serif",minHeight:"100vh"}}>
      <Sidebar active={page} setActive={setPage} role={auth}/>
      <div style={{flex:1,background:c.gray50,minHeight:"100vh",overflow:"auto"}}>
        <Topbar page={page} showToast={showToast}/>
        {pages[page]||pages.dashboard}
      </div>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
